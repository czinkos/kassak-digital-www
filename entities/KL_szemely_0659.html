<div class="entity-div"><p>Szerkesztői jegyzet: 1895–1978, berlini színházi rendező és színész. 1925–1926-ban a Deutsches Volkstheater társulatának rendezőjeként vendégszerepelt Bécsben (Kleines Theater, Raimund Theater), valamint a kommunista csoportban is aktív volt, előadásokat szervezett Bécsben.</p><p>Forrás: <a href="http://viaf.org/viaf/74645687" target="_blank">Viaf</a></p></div>
