<div class="entity-div"><p>Gesztesi Ödön (1886 e.–?) nagyváradi törvényhatósági számtiszt, aki 1893-ban sakkbajnokságot
                              nyert Nagyváradon, majd 1897-ben megalapította a Magyar Sakkújságot.
                              1912-ben vándorolt ki Franciaországba, ahol La Rénaissance Echiquiéenne címmel sakklapot
                              szerkesztett.</p></div>
