<div class="entity-div"><p>Gaál Teréz
               (?–?) Gáll Teréz, Holics Janka rokona, a Móricz-családdal élt, segédkezett a háztartásban.
               Nővérével, Gaál Zsuzsannával felváltva voltak a családnál közel tíz évig.
               Forrás: Móricz Zsigmond, Naplók:
                     1924–1925., kiad. Cséve Anna et al. (Budapest:
                  Noran Könyvesház Kft., 2010), 818.</p></div>
