<div class="entity-div"><p>Faragó József (1866–1906) festő, grafikus, rajzművész.
                  Münchenben, majd Párizsban végezte
               művészi tanulmányait, Hollósy Simon növendéke volt. Az 1890-es években a német,
               amerikai és magyar élclapok népszerű karikatúristája lett.</p></div>
