<div class="entity-div"><p>Szerkesztői jegyzet: 1870‒1937, pszichológus. Az individuálpszichológia alapítója. Kassák a Munkában közli Zilahi László írásait Adler munkájáról.</p><p>Forrás: Zilahi László, „Az emberismeret tudománya. Alfred Adler individual pszichológiája” Munka 1, 3. sz. (1928): 81–85, és 4. sz. (1929): 101–105. </p></div>
