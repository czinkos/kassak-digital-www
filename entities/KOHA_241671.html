<div class="entity-div"><p>Budai János (1866 k.–1915) berekböszörményi református lelkész. A Téli újság
               szerkesztője, 1896-ban jelent meg a Kálvin János élete című
               életrajzi munkája. Forrás: Szőts Farkas, szerk., Protestáns
                     szemle, 10. (Budapest: Horánszky Viktor könynyomdája, 1896),
               54–56.</p></div>
