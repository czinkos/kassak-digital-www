<div class="entity-div"><p>Szerző: Kassák Lajos</p><p>Kiadás helye, ideje: Het Overzicht, 16. sz. (1923. június). A két fametszet korábban Kassák német nyelvű verseskötetének illusztrációjaként jelent meg a Der Sturm kiadásában.(Ludwig Kassák, Ma-Buch: Gedichte, ford. és bev. Gáspár Endre (Berlin–Wien: Der Sturm, 1923.)</p></div>
