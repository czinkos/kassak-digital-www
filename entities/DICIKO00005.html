<div class="entity-div"><p>Anglia a korabeli közbeszédben az Egyesült Királyság egészére, és annak tagállamára, az Angol Királyságra is használt fogalom.</p><p>England is a term used in the vernacular of the time to refer to the United Kingdom as a whole, and also to its member state, the Kingdom of England. </p></div>
