<div class="entity-div"><p>A Német Szövetség (németül: Deutscher Bund) a német államoknak a bécsi kongresszuson 1815-ben létrehozott és 1866-ig fennálló szövetsége.</p><p>The German Confederation (German: Deutscher Bund) was a confederation of German states established at the Congress of Vienna in 1815 and lasting until 1866.</p></div>
